name: Build Vaultwarden Multi-Arch Docker Image

on:
  push:
    branches:
      - main
    tags: # <--- 新增：当有 Git Tag 被推送到仓库时也触发工作流
      - '[1-2].[0-9]+.[0-9]+' # 匹配类似 1.x.x 或 2.x.x 的标签

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_REPO: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # <--- 关键：获取完整的 Git 历史，以便 git describe 工作

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get Vaultwarden Version (from Git Tag or Cargo.toml) # 修改步骤名称
        id: get_vaultwarden_version
        run: |
          # 尝试从 Git Tag 获取精确版本号
          GIT_TAG_VERSION=$(git describe --tags --abbrev=0 --exact-match 2>/dev/null || true)

          if [ -n "$GIT_TAG_VERSION" ]; then
            # 如果当前提交是精确的 Git Tag
            VERSION="$GIT_TAG_VERSION"
            echo "版本号从 Git Tag 获取: $VERSION"
          else
            # 如果不是精确的 Git Tag，则从 Cargo.toml 获取
            VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
            echo "版本号从 Cargo.toml 获取: $VERSION"
          fi

          if [ -z "$VERSION" ]; then
            echo "错误：无法获取到 Vaultwarden 的版本号。"
            exit 1
          fi

          echo "VAULTWARDEN_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push Multi-Arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_REPO }}:${{ env.VAULTWARDEN_VERSION }}-${{ secrets.DOCKER_USERNAME }}
